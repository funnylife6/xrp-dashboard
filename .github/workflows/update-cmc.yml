name: Update CMC XRP Cache

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cmc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch CoinMarketCap XRP data
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
        run: |
          python3 << 'PY'
          import os, json, urllib.request

          api_key = os.environ.get("CMC_API_KEY")
          if not api_key:
              raise RuntimeError("CMC_API_KEY secret is missing")

          url = "https://pro-api.coinmarketcap.com/v1/cryptocurrency/quotes/latest?symbol=XRP&convert=USD,KRW"

          req = urllib.request.Request(
              url,
              headers={
                  "X-CMC_PRO_API_KEY": api_key,
                  "Accept": "application/json"
              }
          )

          with urllib.request.urlopen(req, timeout=20) as res:
              raw = json.loads(res.read().decode("utf-8"))

          xrp = raw["data"]["XRP"]
          usd = xrp["quote"]["USD"]
          krw = xrp["quote"]["KRW"]

          out = {
              "price_usd": usd.get("price"),
              "price_krw": krw.get("price"),
              "market_cap_usd": usd.get("market_cap"),
              "volume_24h": usd.get("volume_24h"),
              "circulating_supply": xrp.get("circulating_supply"),
              "total_supply": xrp.get("total_supply"),
              "market_cap_rank": xrp.get("cmc_rank"),
              "price_change_24h": usd.get("percent_change_24h"),
              "ath_usd": 3.65,
              "twitter_followers": 0,
              "reddit_subscribers": 0,
              "sentiment_votes_up": 0,
              "sentiment_votes_down": 0,
              "source": "CoinMarketCap API"
          }

          with open("cmc_xrp_cache.json", "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          print("Updated cmc_xrp_cache.json")
          PY

      - name: Commit and push cmc_xrp_cache.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cmc_xrp_cache.json
          git commit -m "Update CMC XRP cache" || exit 0
          git push
