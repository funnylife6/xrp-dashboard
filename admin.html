<body>

<h1>🛡 PRO_RIPPLER 관리자</h1>

<div id="admin-list" class="admin-list"></div>

<script>
const ADMIN_PASSWORD = "0922";

if (sessionStorage.getItem("admin_auth") !== "ok") {

    const input = prompt("관리자 비밀번호 입력");

    if (input === ADMIN_PASSWORD) {

        sessionStorage.setItem("admin_auth", "ok");

    } else {

        document.body.innerHTML = "<h1>Access Denied</h1>";
        throw new Error("Unauthorized");

    }
}
const SUPABASE_URL = "https://ofjuaamhrczddosmpcdd.supabase.co";
const SUPABASE_KEY = "sb_publishable_DDh_lP5RbbzTXaO2wuVTtQ_u8q-uLda";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function loadAdminComments(){

  const { data, error } = await supabaseClient
    .from("comments")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    return;
  }

  const list = document.getElementById("admin-list");

  list.innerHTML = "";

  data.forEach(comment => {

    const item = document.createElement("div");

    item.className = "comment-card";

    item.innerHTML = `
      <div class="comment-top">
        <div class="nick">${comment.nickname}</div>

        <div class="meta">
          추천 ${comment.like_count || 0}
          ·
          신고 ${comment.report_count || 0}
        </div>
      </div>

      <div class="content">
        ${comment.content}
      </div>

      <div class="actions">

        ${
          comment.is_hidden
          ?
          `<button class="btn restore-btn">복구</button>`
          :
          `<button class="btn hide-btn">숨김</button>`
        }

        <button class="btn delete-btn">삭제</button>

      </div>
    `;

    list.appendChild(item);

    const hideBtn = item.querySelector(".hide-btn");

    if(hideBtn){
      hideBtn.addEventListener("click", async () => {

        await supabaseClient
          .from("comments")
          .update({ is_hidden:true })
          .eq("id", comment.id);

        loadAdminComments();
      });
    }

    const restoreBtn = item.querySelector(".restore-btn");

    if(restoreBtn){
      restoreBtn.addEventListener("click", async () => {

        await supabaseClient
          .from("comments")
          .update({
            is_hidden:false,
            report_count:0
          })
          .eq("id", comment.id);

        loadAdminComments();
      });
    }

    const deleteBtn = item.querySelector(".delete-btn");

    deleteBtn.addEventListener("click", async () => {

      const ok = confirm("정말 삭제할까요?");

      if(!ok) return;

      await supabaseClient
        .from("comments")
        .delete()
        .eq("id", comment.id);

      loadAdminComments();
    });

  });

}

loadAdminComments();
</script>
